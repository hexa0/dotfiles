context.properties = {
    link.max-buffers                       = 16

    core.daemon = true
    core.name   = pipewire-0

    module.x11.bell = true
    module.access = true
    module.jackdbus-detect = true
}

context.properties.rules = [
    {   matches = [ { cpu.vm.name = !null } ]
        actions = {
            update-props = {
                default.clock.min-quantum = 1024
	    }
        }
    }
]

context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert
    avb.*           = avb/libspa-avb
    api.alsa.*      = alsa/libspa-alsa
    api.v4l2.*      = v4l2/libspa-v4l2
    api.libcamera.* = libcamera/libspa-libcamera
    api.bluez5.*    = bluez5/libspa-bluez5
    api.vulkan.*    = vulkan/libspa-vulkan
    api.jack.*      = jack/libspa-jack
    support.*       = support/libspa-support
    video.convert.* = videoconvert/libspa-videoconvert
}

context.modules = [
    # Uses realtime scheduling to boost the audio thread priorities. This uses
    # RTKit if the user doesn't have permission to use regular realtime
    # scheduling. You can also clamp utilisation values to improve scheduling
    # on embedded and heterogeneous systems, e.g. Arm big.LITTLE devices.
    { name = libpipewire-module-rt
        args = {
            nice.level    = -11
            rt.prio       = 88
            #rt.time.soft = -1
            #rt.time.hard = -1
            #uclamp.min = 0
            #uclamp.max = 1024
        }
        flags = [ ifexists nofail ]
    }

    # The native communication protocol.
    { name = libpipewire-module-protocol-native
        args = {
            # List of server Unix sockets, and optionally permissions
            #sockets = [ { name = "pipewire-0" }, { name = "pipewire-0-manager" } ]
        }
    }

    # The profile module. Allows application to access profiler
    # and performance data. It provides an interface that is used
    # by pw-top and pw-profiler.
    { name = libpipewire-module-profiler }

    # Allows applications to create metadata objects. It creates
    # a factory for Metadata objects.
    { name = libpipewire-module-metadata }

    # Creates a factory for making devices that run in the
    # context of the PipeWire server.
    { name = libpipewire-module-spa-device-factory }

    # Creates a factory for making nodes that run in the
    # context of the PipeWire server.
    { name = libpipewire-module-spa-node-factory }

    # Allows creating nodes that run in the context of the
    # client. Is used by all clients that want to provide
    # data to PipeWire.
    { name = libpipewire-module-client-node }

    # Allows creating devices that run in the context of the
    # client. Is used by the session manager.
    { name = libpipewire-module-client-device }

    # The portal module monitors the PID of the portal process
    # and tags connections with the same PID as portal
    # connections.
    { name = libpipewire-module-portal
        flags = [ ifexists nofail ]
    }

    # The access module can perform access checks and block
    # new clients.
    { name = libpipewire-module-access
        args = {
            # Socket-specific access permissions
            #access.socket = { pipewire-0 = "default", pipewire-0-manager = "unrestricted" }

            # Deprecated legacy mode (not socket-based),
            # for now enabled by default if access.socket is not specified
            #access.legacy = true
        }
        condition = [ { module.access = true } ]
    }

    # Makes a factory for wrapping nodes in an adapter with a
    # converter and resampler.
    { name = libpipewire-module-adapter }

    # Makes a factory for creating links between ports.
    { name = libpipewire-module-link-factory }

    # Provides factories to make session manager objects.
    { name = libpipewire-module-session-manager }

    # Use libcanberra to play X11 Bell
    { name = libpipewire-module-x11-bell
        args = {
            #sink.name = "@DEFAULT_SINK@"
            #sample.name = "bell-window-system"
            #x11.display = null
            #x11.xauthority = null
        }
        flags = [ ifexists nofail ]
        condition = [ { module.x11.bell = true } ]
    }
    { name = libpipewire-module-jackdbus-detect
        args = {
            #jack.library     = libjack.so.0
            #jack.server      = null
            #jack.client-name = PipeWire
            #jack.connect     = true
            #tunnel.mode      = duplex  # source|sink|duplex
            source.props = {
                #audio.channels = 2
		#midi.ports = 1
                #audio.position = [ FL FR ]
                # extra sink properties
            }
            sink.props = {
                #audio.channels = 2
		#midi.ports = 1
                #audio.position = [ FL FR ]
                # extra sink properties
            }
        }
        flags = [ ifexists nofail ]
        condition = [ { module.jackdbus-detect = true } ]
    }

    # e2x2 inputs

    {   name = libpipewire-module-loopback
        args = {
            node.name = "interface-in1_l"
            node.description = "E2x2 (IN1 L)"
            capture.props = {
                node.name = "capture.E2x2_1"
                audio.position = [ FL ]
                stream.dont-remix = true
                target.object = "alsa_input.usb-Topping_E2x2-00.analog-surround-21"
                node.passive = true
            }
            playback.props = {
                node.name = "interface-in1_l"
                media.class = "Audio/Source"
                audio.position = [ MONO ]
            }
        }
    }

    {   name = libpipewire-module-loopback
        args = {
            node.name = "interface-in1_r"
            node.description = "E2x2 (IN2 R)"
            capture.props = {
                node.name = "capture.E2x2_2"
                audio.position = [ FR ]
                stream.dont-remix = true
                target.object = "alsa_input.usb-Topping_E2x2-00.analog-surround-21"
                node.passive = true
            }
            playback.props = {
                node.name = "interface_in2_r"
                media.class = "Audio/Source"
                audio.position = [ MONO ]
            }
        }
    }

    # audio sinks

    { name = libpipewire-module-loopback
        args = {
            capture.props = {
                node.name = "chat_audio_sink"
                node.description = "Voice Chat Audio"
                media.class = "Audio/Sink"
                stream.capture.sink = true
            }
            playback.props = {
                node.target = "alsa_output.usb-Topping_E2x2-00.analog-surround-21"
            }
        }
    }

    { name = libpipewire-module-loopback
        args = {
            capture.props = {
                node.name = "game_audio_sink"
                node.description = "Game Audio"
                media.class = "Audio/Sink"
                stream.capture.sink = true
            }
            playback.props = {
                node.target = "alsa_output.usb-Topping_E2x2-00.analog-surround-21"
            }
        }
    }

    { name = libpipewire-module-loopback
        args = {
            capture.props = {
                node.name = "soundboard_audio_sink"
                node.description = "Soundboard Audio"
                media.class = "Audio/Sink"
                stream.capture.sink = true
            }
            playback.props = {
                node.target = "alsa_output.usb-Topping_E2x2-00.analog-surround-21"
            }
        }
    }
]

context.objects = [
    # virtual processed mic

    { factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "sm57-carla"
            node.description = "SM57 (Carla Processed)"
            media.class      = "Audio/Source/Virtual"
            audio.position   = [FL FR]
        }
    }
]
